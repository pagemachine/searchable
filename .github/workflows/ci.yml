name: CI

on:
  push:
    branches:
     - master
  release:
    types:
      - published
  pull_request:
    branches:
     - master
  schedule:
    - cron: '0 7 * * *'

jobs:
  build:
    name: 'PHP ${{ matrix.php }}, TYPO3 ${{ matrix.typo3 }}, Elasticsearch ${{ matrix.elasticsearch }}'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
        typo3:
          - '^12.4'
          - '^13.4'
        elasticsearch:
          - '7.17.22'

    steps:
      - uses: actions/checkout@v6

      - name: Build
        env:
          PHP_VERSION: ${{matrix.php}}
          TYPO3_VERSION: ${{matrix.typo3}}
          ELASTICSEARCH_VERSION: ${{matrix.elasticsearch}}
        run: docker compose run --rm app composer build

      - name: Cleanup
        if: ${{ always() }}
        run: docker compose down --volumes

  release-ter:
    name: TYPO3 TER release

    if: github.event_name == 'release'
    needs: build

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check tag
        run: |
          if ! [[ ${{ github.event.release.tag_name }} =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            exit 1
          fi

      - name: Deploy to TER
        env:
          TYPO3_API_TOKEN: ${{secrets.TYPO3_API_TOKEN}}
          TYPO3_API_USERNAME: ${{secrets.TYPO3_API_USERNAME}}
          TYPO3_API_PASSWORD: ${{secrets.TYPO3_API_PASSWORD}}
          TAG: ${{ github.event.release.tag_name }}
          UPLOAD_MESSAGE: ${{ github.event.release.body }}
        run: docker compose run --rm app composer ter:deploy
